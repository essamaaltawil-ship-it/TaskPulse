<!DOCTYPE html>
<html lang="ar" dir="rtl" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- أكواد منع التخزين المؤقت (Cache-Busting) لضمان ظهور التحديثات من GitHub مباشرة -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>نظام إدارة أعمال رئيس قسم الحسابات</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#1e3a8a', // Blue 900
                        secondary: '#3b82f6', // Blue 500
                        darkbg: '#111827',
                        darkcard: '#1f2937'
                    },
                    fontFamily: {
                        sans: ['Tajawal', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #f3f4f6; transition: background-color 0.3s; }
        .dark body { background-color: #111827; color: #f9fafb; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        .dark ::-webkit-scrollbar-track { background: #374151; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #4b5563; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Sidebar transition */
        #sidebar { transition: transform 0.3s ease-in-out; }
        
        /* Print Styles */
        @media print {
            html, body { height: auto !important; overflow: visible !important; background: white !important; }
            body * { visibility: hidden; }
            #print-area { display: block !important; visibility: visible !important; position: absolute; left: 0; top: 0; width: 100%; direction: rtl; }
            #print-area * { visibility: visible !important; color: black !important; }
            .no-print { display: none !important; }
            .print-card { border: 1px solid #ccc; padding: 15px; margin-bottom: 15px; page-break-inside: avoid; }
            .print-table { width: 100%; border-collapse: collapse; }
            .print-table th, .print-table td { border: 1px solid #000; padding: 8px; text-align: right; }
            .print-update-box { background-color: #f8fafc !important; border-right: 3px solid #3b82f6 !important; padding: 10px; margin-top: 5px; margin-bottom: 10px; page-break-inside: avoid;}
        }

        .glass-effect { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .dark .glass-effect { background: rgba(31, 41, 55, 0.95); }

        .modal-content { max-height: 90vh; overflow-y: auto; }
        
        /* Form inputs */
        .form-input { 
            width: 100%; padding: 0.5rem; border: 1px solid #d1d5db; border-radius: 0.375rem; 
            background-color: white; color: #111827;
        }
        .dark .form-input {
            background-color: #374151; border-color: #4b5563; color: white;
        }
        .form-input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 1px #3b82f6; }
        
        /* Header Inputs */
        .header-input { 
            width: 100%; padding: 0.25rem; border: 1px solid #d1d5db; border-radius: 0.25rem; 
            font-weight: normal; margin-top: 0.25rem; color: #111827; font-size: 0.75rem;
        }
        .dark .header-input { background-color: #374151; border-color: #4b5563; color: white; }

        /* Custom details dropdown */
        details.filter-dropdown summary { list-style: none; }
        details.filter-dropdown summary::-webkit-details-marker { display: none; }
    </style>
</head>
<body class="text-gray-800 antialiased h-screen flex overflow-hidden">

    <!-- Notification Toast -->
    <div id="toast" class="fixed top-5 left-1/2 transform -translate-x-1/2 z-50 transition-all duration-300 opacity-0 hidden">
        <div class="bg-gray-800 text-white px-6 py-3 rounded shadow-lg flex items-center gap-3">
            <i id="toast-icon" class="fas fa-info-circle"></i>
            <span id="toast-msg">رسالة</span>
        </div>
    </div>

    <!-- Task Hover Tooltip Container -->
    <div id="task-tooltip" class="fixed z-50 hidden bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 shadow-2xl rounded-lg p-4 w-80 pointer-events-none transition-opacity duration-200 opacity-0" style="direction: rtl;"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="bg-primary text-white w-64 flex-shrink-0 hidden md:flex flex-col shadow-xl z-20">
        <div class="p-5 flex items-center justify-center border-b border-blue-800">
            <i class="fas fa-calculator text-3xl ml-3 text-blue-300"></i>
            <h1 class="text-xl font-bold font-sans tracking-wide">إدارة الحسابات</h1>
        </div>
        <nav class="flex-1 overflow-y-auto py-4 space-y-1">
            <a href="#" onclick="nav('dashboard')" class="nav-link block px-5 py-3 hover:bg-blue-800 transition border-r-4 border-transparent hover:border-blue-400 active-nav" data-target="dashboard"><i class="fas fa-home ml-3 w-5"></i> لوحة القيادة</a>
            <a href="#" onclick="nav('employees')" class="nav-link block px-5 py-3 hover:bg-blue-800 transition border-r-4 border-transparent hover:border-blue-400" data-target="employees"><i class="fas fa-users ml-3 w-5"></i> إدارة الموظفين</a>
            <a href="#" onclick="nav('elementTypes')" class="nav-link block px-5 py-3 hover:bg-blue-800 transition border-r-4 border-transparent hover:border-blue-400" data-target="elementTypes"><i class="fas fa-tags ml-3 w-5"></i> أنواع العناصر</a>
            <a href="#" onclick="nav('elements')" class="nav-link block px-5 py-3 hover:bg-blue-800 transition border-r-4 border-transparent hover:border-blue-400" data-target="elements"><i class="fas fa-cubes ml-3 w-5"></i> عناصر العمل</a>
            <a href="#" onclick="nav('assignments')" class="nav-link block px-5 py-3 hover:bg-blue-800 transition border-r-4 border-transparent hover:border-blue-400" data-target="assignments"><i class="fas fa-link ml-3 w-5"></i> إسناد العناصر</a>
            <a href="#" onclick="nav('tasks')" class="nav-link block px-5 py-3 hover:bg-blue-800 transition border-r-4 border-transparent hover:border-blue-400" data-target="tasks"><i class="fas fa-tasks ml-3 w-5"></i> المهام الرئيسية</a>
            <a href="#" onclick="nav('requirements')" class="nav-link block px-5 py-3 hover:bg-blue-800 transition border-r-4 border-transparent hover:border-blue-400" data-target="requirements"><i class="fas fa-list-check ml-3 w-5"></i> المتطلبات</a>
            <a href="#" onclick="nav('handovers')" class="nav-link block px-5 py-3 hover:bg-blue-800 transition border-r-4 border-transparent hover:border-blue-400" data-target="handovers"><i class="fas fa-exchange-alt ml-3 w-5"></i> التسليم والاستلام</a>
            <a href="#" onclick="nav('reports')" class="nav-link block px-5 py-3 hover:bg-blue-800 transition border-r-4 border-transparent hover:border-blue-400" data-target="reports"><i class="fas fa-chart-bar ml-3 w-5"></i> التقارير</a>
            <a href="#" onclick="nav('audit')" class="nav-link block px-5 py-3 hover:bg-blue-800 transition border-r-4 border-transparent hover:border-blue-400" data-target="audit"><i class="fas fa-history ml-3 w-5"></i> سجل الحركة</a>
            <a href="#" onclick="nav('settings')" class="nav-link block px-5 py-3 hover:bg-blue-800 transition border-r-4 border-transparent hover:border-blue-400" data-target="settings"><i class="fas fa-cog ml-3 w-5"></i> الإعدادات</a>
        </nav>
        <div class="p-4 border-t border-blue-800 text-sm text-center text-blue-300">
            الإصدار 1.5.3
        </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col h-full overflow-hidden relative">
        <!-- Topbar -->
        <header class="glass-effect shadow-sm h-16 flex items-center justify-between px-6 z-10 border-b border-gray-200 dark:border-gray-700">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="md:hidden text-gray-600 dark:text-gray-300 hover:text-primary">
                    <i class="fas fa-bars text-xl"></i>
                </button>
                <h2 id="page-title" class="text-xl font-bold text-gray-800 dark:text-white">لوحة القيادة</h2>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="toggleDarkMode()" class="text-gray-500 hover:text-yellow-500 transition" title="تبديل المظهر">
                    <i id="theme-icon" class="fas fa-moon text-xl"></i>
                </button>
                <div class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center font-bold">م</div>
                    <span class="text-sm font-medium dark:text-gray-200 hidden sm:block">رئيس الحسابات</span>
                </div>
            </div>
        </header>

        <!-- Dynamic Content Area -->
        <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-50 dark:bg-darkbg p-4 md:p-6" id="main-content">
            <!-- Sections will be injected here via JS -->
            <div id="view-dashboard" class="view-section"></div>
            <div id="view-employees" class="view-section hidden"></div>
            <div id="view-elementTypes" class="view-section hidden"></div>
            <div id="view-elements" class="view-section hidden"></div>
            <div id="view-assignments" class="view-section hidden"></div>
            <div id="view-tasks" class="view-section hidden"></div>
            <div id="view-requirements" class="view-section hidden"></div>
            <div id="view-handovers" class="view-section hidden"></div>
            <div id="view-reports" class="view-section hidden"></div>
            <div id="view-audit" class="view-section hidden"></div>
            <div id="view-settings" class="view-section hidden"></div>
        </main>
    </div>

    <!-- Print Area -->
    <div id="print-area" class="hidden bg-white text-black p-8"></div>

    <!-- Global Modals Container -->
    <div id="modals-container"></div>

    <!-- Application Script -->
    <script>
        // --- State Management ---
        const DB_KEY = 'AccountingDeptSystemDB';
        let db = {
            employees: [],
            elementTypes: [],
            elements: [],
            assignments: [],
            tasks: [],
            requirements: [],
            handovers: [],
            auditLog: [],
            settings: { darkMode: false }
        };

        // --- Core Functions ---
        function initDB() {
            const stored = localStorage.getItem(DB_KEY);
            if (stored) {
                try {
                    db = JSON.parse(stored);
                    if(db.settings && db.settings.darkMode) {
                        document.documentElement.classList.add('dark');
                        document.getElementById('theme-icon').classList.replace('fa-moon', 'fa-sun');
                    }
                    // Data Migration: Ensure existing requirements have updates array
                    if(db.requirements) {
                        db.requirements.forEach(req => {
                            if (!req.updates) req.updates = [];
                        });
                    }
                } catch(e) { console.error("Error loading DB", e); seedDB(); }
            } else {
                seedDB();
            }
            renderDashboard();
        }

        function saveDB() {
            localStorage.setItem(DB_KEY, JSON.stringify(db));
        }

        function generateId() {
            return 'id-' + Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
        }

        function logAction(action, entity, entityId, desc, user = 'رئيس الحسابات', prev = null, current = null) {
            db.auditLog.unshift({
                id: generateId(),
                timestamp: new Date().toISOString(),
                action, entity, entityId, desc, user, prev, current
            });
            saveDB();
        }

        function showToast(msg, type = 'info') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            document.getElementById('toast-msg').innerText = msg;
            
            toast.className = 'fixed top-5 left-1/2 transform -translate-x-1/2 z-50 transition-all duration-300 flex items-center gap-3 px-6 py-3 rounded shadow-lg text-white';
            
            if(type === 'success') {
                toast.classList.add('bg-green-600'); icon.className = 'fas fa-check-circle';
            } else if(type === 'error') {
                toast.classList.add('bg-red-600'); icon.className = 'fas fa-exclamation-triangle';
            } else {
                toast.classList.add('bg-gray-800'); icon.className = 'fas fa-info-circle';
            }

            toast.classList.remove('hidden', 'opacity-0');
            toast.classList.add('opacity-100');

            setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0');
                setTimeout(() => toast.classList.add('hidden'), 300);
            }, 3000);
        }

        function copyToClipboard(text) {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => {
                    showToast('تم نسخ مسار الملف للحافظة بنجاح', 'success');
                }).catch(err => {
                    showToast('فشل النسخ التلقائي', 'error');
                });
            } else {
                // Fallback for non-https or unsupported browsers
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.left = "-999999px";
                textArea.style.top = "-999999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                    showToast('تم نسخ مسار الملف للحافظة بنجاح', 'success');
                } catch (error) {
                    showToast('فشل النسخ', 'error');
                }
                textArea.remove();
            }
        }

        // --- UI Navigation & Theme ---
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            if(sidebar.classList.contains('hidden')) {
                sidebar.classList.remove('hidden');
                sidebar.classList.add('absolute', 'h-full', 'z-40');
            } else {
                sidebar.classList.add('hidden');
                sidebar.classList.remove('absolute', 'h-full', 'z-40');
            }
        }

        function toggleDarkMode() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            db.settings.darkMode = !db.settings.darkMode;
            if (db.settings.darkMode) {
                html.classList.add('dark');
                icon.classList.replace('fa-moon', 'fa-sun');
            } else {
                html.classList.remove('dark');
                icon.classList.replace('fa-sun', 'fa-moon');
            }
            saveDB();
        }

        // Helper function for Multi-Select Filters
        function getCheckedValues(containerClass) {
            const checkboxes = document.querySelectorAll(`.${containerClass} input[type="checkbox"]:checked`);
            return Array.from(checkboxes).map(cb => cb.value);
        }

        const sectionTitles = {
            'dashboard': 'لوحة القيادة', 'employees': 'إدارة الموظفين', 'elementTypes': 'أنواع العناصر',
            'elements': 'عناصر العمل', 'assignments': 'إسناد العناصر', 'tasks': 'المهام الرئيسية',
            'requirements': 'متطلبات المهام', 'handovers': 'التسليم والاستلام', 'reports': 'التقارير',
            'audit': 'سجل الحركة', 'settings': 'الإعدادات'
        };

        function nav(section) {
            document.querySelectorAll('.nav-link').forEach(el => {
                el.classList.remove('bg-blue-800', 'border-blue-400');
                el.classList.add('border-transparent');
            });
            document.querySelector(`[data-target="${section}"]`).classList.add('bg-blue-800', 'border-blue-400');
            document.querySelector(`[data-target="${section}"]`).classList.remove('border-transparent');

            document.querySelectorAll('.view-section').forEach(el => el.classList.add('hidden'));
            
            document.getElementById(`view-${section}`).classList.remove('hidden');
            document.getElementById('page-title').innerText = sectionTitles[section];

            if(window.innerWidth < 768) { document.getElementById('sidebar').classList.add('hidden'); }

            switch(section) {
                case 'dashboard': renderDashboard(); break;
                case 'employees': renderEmployees(); break;
                case 'elementTypes': renderElementTypes(); break;
                case 'elements': renderElements(); break;
                case 'assignments': renderAssignments(); break;
                case 'tasks': renderTasks(); break;
                case 'requirements': renderRequirements(); break;
                case 'handovers': renderHandovers(); break;
                case 'reports': renderReports(); break;
                case 'audit': renderAudit(); break;
                case 'settings': renderSettings(); break;
            }
        }

        // --- Modal System ---
        function openModal(id, htmlContent) {
            let container = document.getElementById('modals-container');
            container.innerHTML = `
                <div id="${id}" class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 transition-opacity">
                    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-xl w-full max-w-4xl mx-4 modal-content transform transition-transform scale-100 flex flex-col max-h-[90vh]">
                        ${htmlContent}
                    </div>
                </div>
            `;
            document.addEventListener('keydown', function escListener(e) {
                if(e.key === 'Escape') { closeModal(id); document.removeEventListener('keydown', escListener); }
            });
        }

        function closeModal(id) {
            const modal = document.getElementById(id);
            if(modal) {
                modal.classList.add('opacity-0');
                setTimeout(() => modal.remove(), 200);
            }
        }

        function filterTable(tableId, query) {
            const table = document.getElementById(tableId);
            if (!table) return;
            const tbody = table.querySelector('tbody');
            if (!tbody) return;
            const rows = tbody.getElementsByTagName('tr');
            const filter = query.toLowerCase();
            for (let i = 0; i < rows.length; i++) {
                const rowText = rows[i].textContent || rows[i].innerText;
                rows[i].style.display = rowText.toLowerCase().includes(filter) ? '' : 'none';
            }
        }
        
        function viewEntityHistory(entityId, title) {
            const logs = db.auditLog.filter(l => l.entityId === entityId);
            let html = `
                <div class="p-4 border-b dark:border-gray-700 flex justify-between items-center bg-gray-50 dark:bg-gray-800 rounded-t-lg flex-shrink-0">
                    <h3 class="text-lg font-bold dark:text-white"><i class="fas fa-history text-purple-500 ml-2"></i> سجل حركة النظام: ${title}</h3>
                    <button onclick="closeModal('historyModal')" class="text-gray-500 hover:text-red-500"><i class="fas fa-times text-xl"></i></button>
                </div>
                <div class="p-6 space-y-4 overflow-y-auto flex-1">
                    ${logs.length === 0 ? '<p class="text-gray-500 text-center py-4">لا يوجد سجل حركات حتى الآن.</p>' : 
                        '<ul class="space-y-4 relative border-r-2 border-gray-200 dark:border-gray-700 pr-4 mr-2">' +
                        logs.map(l => `
                            <li class="relative">
                                <div class="absolute w-3 h-3 bg-purple-500 rounded-full -right-[1.4rem] top-1"></div>
                                <div class="bg-gray-50 dark:bg-gray-700 p-3 rounded shadow-sm border border-gray-100 dark:border-gray-600">
                                    <div class="flex justify-between items-center mb-1 text-sm">
                                        <span class="font-bold text-indigo-600 dark:text-indigo-400">${l.action}</span>
                                        <span class="text-gray-500 text-xs" dir="ltr">${new Date(l.timestamp).toLocaleString('ar-SA')}</span>
                                    </div>
                                    <p class="text-gray-800 dark:text-gray-200 text-sm leading-relaxed">${l.desc}</p>
                                    <p class="text-gray-500 text-xs mt-2"><i class="fas fa-user ml-1"></i>بواسطة: ${l.user}</p>
                                </div>
                            </li>
                        `).join('') + '</ul>'
                    }
                </div>
            `;
            openModal('historyModal', html);
        }

        // --- Local Attachment Handler ---
        function copyAttachmentPath(reqId, updateId) {
            const req = db.requirements.find(r => r.id === reqId);
            if (!req || !req.updates) return;
            const update = req.updates.find(u => u.id === updateId);
            if (update && update.attachmentPath) {
                copyToClipboard(update.attachmentPath);
            }
        }

        function openLocalAttachment(e, reqId, updateId) {
            const req = db.requirements.find(r => r.id === reqId);
            if (!req || !req.updates) return true;
            const update = req.updates.find(u => u.id === updateId);
            if (!update || !update.attachmentPath) return true;

            const path = update.attachmentPath;

            // Check if we are running from a web server (http/https)
            if (window.location.protocol === 'http:' || window.location.protocol === 'https:') {
                e.preventDefault();
                copyToClipboard(path); // Auto copy to clipboard
                
                // Show instructive modal
                let html = `
                    <div class="p-4 border-b dark:border-gray-700 flex justify-between items-center bg-yellow-50 dark:bg-yellow-900/20 rounded-t-xl">
                        <h3 class="text-lg font-bold text-yellow-700 dark:text-yellow-400"><i class="fas fa-shield-alt ml-2"></i>تنبيه أمني من المتصفح</h3>
                        <button onclick="closeModal('localFileModal')" class="text-gray-500 hover:text-red-500"><i class="fas fa-times text-xl"></i></button>
                    </div>
                    <div class="p-6 space-y-4">
                        <p class="text-sm text-gray-700 dark:text-gray-300 leading-relaxed">
                            نظراً لأنك تستخدم النظام عبر الإنترنت (مثلاً من GitHub)، فإن المتصفح (Chrome/Edge) يمنع فتح الملفات الموجودة في جهازك أو السيرفر الداخلي لحمايتك من الاختراق والفيروسات.
                        </p>
                        <div class="bg-green-50 dark:bg-green-900/20 border border-green-200 dark:border-green-800 p-4 rounded-lg">
                            <h4 class="font-bold text-green-800 dark:text-green-400 mb-3"><i class="fas fa-check-circle ml-2"></i>تم نسخ مسار الملف! لفتحه اتبع التالي:</h4>
                            <ol class="list-decimal list-inside text-sm text-green-700 dark:text-green-300 space-y-3 font-bold">
                                <li>اضغط على مفتاحي <kbd class="bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 px-2 py-1 rounded text-gray-800 dark:text-white mx-1 shadow-sm font-sans" dir="ltr">Windows + R</kbd> في لوحة المفاتيح.</li>
                                <li>قم بلصق المسار (اضغط <kbd class="bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 px-2 py-1 rounded text-gray-800 dark:text-white mx-1 shadow-sm font-sans" dir="ltr">Ctrl + V</kbd>) في نافذة "تشغيل" (Run) التي ظهرت.</li>
                                <li>اضغط <strong>Enter</strong> وسيفتح الملف ببرنامجه الأصلي فوراً (مثل Outlook).</li>
                            </ol>
                        </div>
                        <div class="mt-4">
                            <label class="block text-xs font-bold text-gray-500 mb-1">المسار الذي تم نسخه:</label>
                            <input type="text" readonly value="${path.replace(/"/g, '&quot;')}" class="form-input bg-gray-100 dark:bg-gray-900 text-left font-mono text-xs w-full text-blue-600 dark:text-blue-400" dir="ltr">
                        </div>
                        <div class="flex justify-end mt-4">

                const idx = db.employees.findIndex(x => x.id === id);

                db.employees.push({ id: generateId(), isDeleted: false, ...data });

            saveDB(); closeModal('empModal'); renderEmployees();

            if (id !== 'null') {

                db.elements.push({ id: generateId(), ...data });

                    </form>
                </div>
            `;
            openModal('assignModal', html);
        }

            e.preventDefault();

            const selectedElementIds = Array.from(document.getElementById('asf_els').selectedOptions).map(opt => opt.value);
            const start = document.getElementById('asf_start').value;

            selectedElementIds.forEach(elId => {
                const existing = db.assignments.find(a => a.elementId === elId && a.status === 'نشط');
                if(existing) { existing.status = 'مغلق'; existing.endDate = start; } 
                db.assignments.push({ id: generateId(), elementId: elId, employeeId: empId, startDate: start, status: 'نشط' });
            });
            saveDB(); closeModal('assignModal'); renderAssignments();
        }

        function closeAssignment(id) {
            if(confirm('هل أنت متأكد من إنهاء هذا الإسناد؟')) {
                const a = db.assignments.find(x => x.id === id);
                a.status = 'مغلق';
                a.endDate = new Date().toISOString().split('T')[0];
                saveDB(); renderAssignments();
            }

                                                <label class="flex items-center gap-2 p-1 hover:bg-gray-50 dark:hover:bg-gray-700 cursor-pointer"><input type="checkbox" value="قيد التنفيذ" class="rounded text-blue-600" onchange="filterTaskTable()"> قيد التنفيذ</label>

        function sortTasks(col) {
            if (currentTaskSort.col === col) {
                currentTaskSort.dir = currentTaskSort.dir === 'asc' ? 'desc' : 'asc';
            } else {
                currentTaskSort.col = col;
                currentTaskSort.dir = 'asc';
            }
            filterTaskTable();
        }

        function filterTaskTable() {
            const tbody = document.getElementById('tasks-tbody');
            if (!tbody) return;

            const fId = document.getElementById('ft_id').value.toLowerCase();
            const fTitle = document.getElementById('ft_title').value.toLowerCase();
            const fDate = document.getElementById('ft_date').value;
            const selectedStatuses = getCheckedValues('filter-status-task');

            let filtered = db.tasks.filter(t => {
                return t.id.toLowerCase().includes(fId) &&
                       t.title.toLowerCase().includes(fTitle) &&
                       (fDate === '' || t.dueDate === fDate) &&
                       (selectedStatuses.length === 0 || selectedStatuses.includes(t.status));
            });

            filtered.sort((a, b) => {
                let valA = a[currentTaskSort.col] || '';
                let valB = b[currentTaskSort.col] || '';
                if (currentTaskSort.col === 'id') { valA = valA.substr(-5); valB = valB.substr(-5); }
                if (valA < valB) return currentTaskSort.dir === 'asc' ? -1 : 1;
                if (valA > valB) return currentTaskSort.dir === 'asc' ? 1 : -1;
                return 0;
            });

            tbody.innerHTML = filtered.map(t => {
                const reqs = db.requirements.filter(r => r.taskId === t.id);
                const total = reqs.length;
                const completed = reqs.filter(r => r.status === 'مكتمل').length;
                const progress = total === 0 ? 0 : Math.round((completed / total) * 100);
                let statusClass = 'bg-gray-100 text-gray-800';
                if(t.status === 'مكتملة فنيًا' || t.status === 'مقفلة') statusClass = 'bg-green-100 text-green-800';
                if(t.status === 'بانتظار متطلبات') statusClass = 'bg-yellow-100 text-yellow-800';
                
                return `
                <tr class="hover:bg-gray-50 dark:hover:bg-gray-700">
                    <td class="px-4 py-3">${t.id.substr(-5)}</td>
                    <td class="px-4 py-3 font-bold">${t.title}</td>
                    <td class="px-4 py-3 ${new Date(t.dueDate) < new Date() && t.status !== 'مقفلة' ? 'text-red-500 font-bold' : ''}">${t.dueDate}</td>
                    <td class="px-4 py-3"><span class="px-2 py-1 text-xs rounded-full ${statusClass}">${t.status}</span></td>
                    <td class="px-4 py-3">
                        <div class="w-full bg-gray-200 rounded-full h-2.5 dark:bg-gray-700 mt-1">
                            <div class="bg-blue-600 h-2.5 rounded-full" style="width: ${progress}%"></div>
                        </div>
                        <span class="text-xs">${progress}%</span>
                    </td>
                    <td class="px-4 py-3 flex gap-2">
                        <button onclick="viewTaskDetails('${t.id}')" class="text-blue-500 hover:text-blue-700 text-sm bg-blue-50 dark:bg-blue-900 px-2 py-1 rounded">إدارة المهام</button>
                        <button onclick="openTaskForm('${t.id}')" class="text-gray-500 hover:text-gray-700"><i class="fas fa-edit"></i></button>
                        <button onclick="deleteTask('${t.id}')" class="text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
            }).join('');
        }

        function deleteTask(id) {
            if (confirm('هل أنت متأكد من حذف المهمة ومتطلباتها؟')) {
                db.requirements = db.requirements.filter(r => r.taskId !== id);
                db.tasks = db.tasks.filter(t => t.id !== id);
                saveDB(); filterTaskTable();
            }
        }

            const statusOpts = ['جديدة','قيد التنفيذ','بانتظار متطلبات','مكتملة فنيًا','مقفلة','موقوفة','ملغاة'];

        function saveTask(e, id) {
            e.preventDefault();
            const data = {
                title: document.getElementById('tk_title').value, category: document.getElementById('tk_cat').value,
                priority: document.getElementById('tk_pri').value, dueDate: document.getElementById('tk_due').value,
                status: document.getElementById('tk_status').value, description: document.getElementById('tk_desc').value,

            if(id !== 'null') {
                const idx = db.tasks.findIndex(x => x.id === id);
                db.tasks[idx] = { ...db.tasks[idx], ...data };
            } else {
                const newId = generateId();
                db.tasks.push({ id: newId, openDate: new Date().toISOString().split('T')[0], ownerId: 'النظام', ...data });

            saveDB(); closeModal('taskModal'); renderTasks();

                currentReqSort.col = col;
                currentReqSort.dir = 'asc';

        function filterRequirements() {
            const tbody = document.getElementById('req-tbody');
            if (!tbody) return;

            const fTask = document.getElementById('fr_task').value;
            const fTitle = document.getElementById('fr_title').value.toLowerCase();
            const fEmp = document.getElementById('fr_emp').value;
            const fDate = document.getElementById('fr_date').value;
            const selectedStatuses = getCheckedValues('filter-status-req');

            let filtered = db.requirements.filter(r => {
                return (fTask === '' || r.taskId === fTask) &&
                       r.title.toLowerCase().includes(fTitle) &&
                       (fEmp === '' || r.employeeId === fEmp) &&
                       (fDate === '' || r.dueDate === fDate) &&
                       (selectedStatuses.length === 0 || selectedStatuses.includes(r.status));
            });

            filtered.sort((a, b) => {
                let valA = a[currentReqSort.col] || '';
                let valB = b[currentReqSort.col] || '';
                if (valA < valB) return currentReqSort.dir === 'asc' ? -1 : 1;
                if (valA > valB) return currentReqSort.dir === 'asc' ? 1 : -1;
                return 0;

            tbody.innerHTML = filtered.map(r => {

        function saveReq(e, id) {
            e.preventDefault();
            const data = {
                taskId: document.getElementById('rq_task').value,
                title: document.getElementById('rq_title').value,
                employeeId: document.getElementById('rq_emp').value,
                dueDate: document.getElementById('rq_due').value,
                status: document.getElementById('rq_status').value,
                isMandatory: document.getElementById('rq_mand').value === 'true',
                description: document.getElementById('rq_desc').value
            };

            if(id !== 'null') {
                const idx = db.requirements.findIndex(x => x.id === id);
                db.requirements[idx] = { ...db.requirements[idx], ...data };
                showToast('تم تعديل المتطلب الأساسي', 'success');
            } else {
                const newId = generateId();
                db.requirements.push({ id: newId, updates: [], ...data });
                showToast('تم إنشاء متطلب جديد', 'success');
            }
            saveDB(); filterRequirements();
            
            // If we are editing, keep modal open but re-render to reflect changes. 
            // If new, close it.
            if(id === 'null') closeModal('reqModal');
        }

        function saveReqUpdate(reqId) {
            const text = document.getElementById('req_upd_text').value.trim();
            let attach = document.getElementById('req_upd_attach').value.trim();
            
            // إزالة علامات التنصيص إذا كان المستخدم قد نسخ المسار بـ "Copy as path"
            attach = attach.replace(/^["']|["']$/g, '');

            if(!text) { showToast('يجب كتابة نص التحديث', 'error'); return; }

            const reqIdx = db.requirements.findIndex(x => x.id === reqId);
            if(reqIdx > -1) {
                const newUpdate = {
                    id: generateId(),
                    timestamp: new Date().toISOString(),
                    text: text,
                    attachmentPath: attach,
                    user: 'رئيس الحسابات (النظام)'
                };
                db.requirements[reqIdx].updates.unshift(newUpdate);
                saveDB();
                showToast('تم إضافة التحديث بنجاح', 'success');
                openReqForm(reqId); // Re-render modal to show new update
            }
        }

        function deleteReqUpdate(reqId, updateId) {
            if(confirm('هل أنت متأكد من حذف هذا التحديث بشكل نهائي؟')) {
                const reqIdx = db.requirements.findIndex(x => x.id === reqId);
                if(reqIdx > -1) {
                    db.requirements[reqIdx].updates = db.requirements[reqIdx].updates.filter(u => u.id !== updateId);
                    saveDB();
                    showToast('تم مسح التحديث بنجاح', 'success');
                    openReqForm(reqId); // Re-render to update the timeline
                }
            }
        }

        function editReqUpdate(reqId, updateId) {
            const reqIdx = db.requirements.findIndex(x => x.id === reqId);
            if(reqIdx > -1) {
                const update = db.requirements[reqIdx].updates.find(u => u.id === updateId);
                if(update) {
                    const newText = prompt('تعديل نص التحديث:', update.text);
                    if(newText !== null && newText.trim() !== '') {
                        update.text = newText.trim();
                        saveDB();
                        showToast('تم تعديل التحديث بنجاح', 'success');
                        openReqForm(reqId); // Re-render
                    }
                }
            }
        }

        function saveHandover(e) {
            e.preventDefault();
            const fromId = document.getElementById('ho_from').value;
            const toId = document.getElementById('ho_to').value;
            if(fromId === toId) { showToast('لا يمكن التسليم لنفس الموظف', 'error'); return; }

            const date = document.getElementById('ho_date').value;
            const type = document.getElementById('ho_type').value;

            const activeAssigns = db.assignments.filter(a => a.employeeId === fromId && a.status === 'نشط');
            const elementsTransferred = [];
            activeAssigns.forEach(a => {
                a.status = 'مغلق'; a.endDate = date; 
                db.assignments.push({
                    id: generateId(), elementId: a.elementId, employeeId: toId,
                    startDate: date, endDate: null, isPermanent: type.includes('دائم'),
                    reason: `تسليم واستلام من ${db.employees.find(e=>e.id===fromId).name}`, status: 'نشط'
                });
                elementsTransferred.push(a.elementId);
            });

            const openReqs = db.requirements.filter(r => r.employeeId === fromId && ['جديد','مسند','قيد التنفيذ','بانتظار بيانات','معاد للتصحيح'].includes(r.status));
            const requirementsTransferred = [];
            openReqs.forEach(r => {
                r.employeeId = toId; 
                requirementsTransferred.push(r.id);
            });

            const hoId = generateId();
            db.handovers.push({
                id: hoId, fromEmpId: fromId, toEmpId: toId, startDate: date, type: type,
                status: 'مغلق', elementsTransferred, requirementsTransferred,
                notes: document.getElementById('ho_notes').value
            });

            saveDB(); closeModal('hoModal'); renderHandovers(); showToast('تم الاعتماد والنقل بنجاح', 'success');
        }

                html = `
                    <div class="print-card">
                        <h1 style="text-align:center; margin-bottom: 20px; color:#1e3a8a;">تقرير بيانات الموظف والعهد</h1>
                        <table class="print-table" style="margin-bottom: 20px;">
                            <tr><th style="background:#f1f5f9;">الاسم</th><td style="font-weight:bold;">${emp.name}</td><th style="background:#f1f5f9;">الرقم</th><td>${emp.code}</td></tr>
                            <tr><th style="background:#f1f5f9;">القسم</th><td>${emp.department}</td><th style="background:#f1f5f9;">المسمى</th><td>${emp.title}</td></tr>
                        </table>
                        
                        <h3 style="border-bottom:1px solid #ccc; padding-bottom:5px;">العناصر المسندة حالياً (${assigns.length})</h3>
                        <table class="print-table" style="margin-bottom: 20px;">
                            <tr style="background:#f1f5f9;"><th>كود العنصر</th><th>الاسم</th><th>النوع</th><th>تاريخ الإسناد</th></tr>
                            ${assigns.map(a => {
                                const el = db.elements.find(e => e.id === a.elementId);
                                const tName = db.elementTypes.find(t=>t.id===el?.typeId)?.name;
                                return `<tr><td>${el?.code||''}</td><td style="font-weight:bold;">${el?.name||''}</td><td>${tName||''}</td><td dir="ltr">${a.startDate}</td></tr>`;
                            }).join('')}
                        </table>

                        <h3 style="border-bottom:1px solid #ccc; padding-bottom:5px;">المتطلبات المفتوحة في ذمته (${reqs.length})</h3>
                        <table class="print-table">
                            <tr style="background:#f1f5f9;"><th>وصف المتطلب</th><th>المهمة الأم (المشروع)</th><th>الديدلاين</th><th>الحالة</th></tr>
                            ${reqs.map(r => {
                                const tName = db.tasks.find(t=>t.id===r.taskId)?.title;
                                return `<tr><td style="font-weight:bold;">${r.title}</td><td>${tName||''}</td><td dir="ltr" style="color:red; font-weight:bold;">${r.dueDate}</td><td>${r.status}</td></tr>`;
                            }).join('')}
                        </table>
                    </div>`;
            } else if (type === 'task') {
                const id = document.getElementById('rep_taskId').value;
                if(!id) return;
                const task = db.tasks.find(t => t.id === id);
                const reqs = db.requirements.filter(r => r.taskId === id);
                
                const completedCount = reqs.filter(r=>r.status==='مكتمل').length;
                const prog = reqs.length === 0 ? 0 : Math.round((completedCount/reqs.length)*100);

                html = `
                    <div class="print-card">
                        <div style="text-align:center; border-bottom: 2px solid #166534; padding-bottom: 10px; margin-bottom: 20px;">
                            <h1 style="margin: 0; color:#166534; font-size:24px;">التقرير التتبعي للمهمة والمرفقات</h1>
                            <p style="margin: 5px 0 0 0; color: #666; font-size: 12px;">تاريخ الاستخراج: ${new Date().toLocaleString('ar-SA')} | نظام الإدارة المالية</p>
                        </div>
                        
                        <div style="background-color:#f0fdf4; padding:15px; border:1px solid #bbf7d0; border-radius: 6px; margin-bottom: 30px;">
                            <table class="print-table" style="margin-bottom: 0; border: none;">
                                <tr>
                                    <th style="width:15%; background:transparent; border:none; text-align:right;">العنوان:</th>
                                    <td colspan="3" style="font-weight:900; font-size:20px; border:none; border-bottom: 1px solid #bbf7d0; color:#166534;">${task.title}</td>
                                </tr>
                                <tr>
                                    <th style="background:transparent; border:none; text-align:right; padding-top: 10px;">الحالة:</th>
                                    <td style="border:none; padding-top: 10px; font-weight:bold;">${task.status} <span style="margin-right:10px; font-size:12px; background:#166534; color:#fff; padding:2px 6px; border-radius:4px;">إنجاز: ${prog}%</span></td>
                                    <th style="background:transparent; border:none; text-align:right; padding-top: 10px;">الاستحقاق:</th>
                                    <td style="border:none; padding-top: 10px; font-weight:bold; color:red;" dir="ltr">${task.dueDate}</td>
                                </tr>
                            </table>
                        </div>
                        
                        <h2 style="color:#1e3a8a; border-bottom:2px solid #1e3a8a; padding-bottom:5px; margin-bottom:20px;">تفاصيل المتطلبات وسجل التحديثات الحية</h2>
                        `;

                if(reqs.length === 0) {
                    html += `<p style="text-align:center; padding:20px; color:#666;">لا توجد متطلبات مرتبطة بهذه المهمة.</p>`;
                }

                reqs.forEach((r, index) => {
                    const empName = db.employees.find(e=>e.id===r.employeeId)?.name || 'غير محدد';
                    
                    html += `
                    <div style="margin-bottom: 30px; border: 1px solid #cbd5e1; border-radius: 6px; overflow: hidden; page-break-inside: avoid;">
                        <div style="background-color: #f1f5f9; padding: 12px; border-bottom: 1px solid #cbd5e1; display:flex; justify-content: space-between;">
                            <h3 style="margin:0; font-size: 16px; color: #0f172a;">${index + 1}. ${r.title}</h3>
                            <span style="font-weight:bold; font-size:12px; padding:2px 8px; border-radius:4px; border:1px solid #ccc; background:#fff;">${r.status}</span>
                        </div>
                        <div style="padding: 12px; background: #fff;">
                            <div style="display:flex; justify-content:space-between; font-size:12px; color:#475569; margin-bottom:10px; border-bottom:1px dashed #e2e8f0; padding-bottom:10px;">
                                <span><strong>المسؤول:</strong> ${empName}</span>
                                <span><strong>الاستحقاق:</strong> <span dir="ltr">${r.dueDate}</span></span>
                            </div>
                            
                            <h4 style="margin: 0 0 10px 0; font-size: 14px; color: #1e3a8a;">التحديثات الميدانية والمرفقات:</h4>
                    `;

                    if(!r.updates || r.updates.length === 0) {
                        html += `<p style="font-size:12px; color:#94a3b8; font-style:italic; padding-right:15px;">لا توجد تحديثات أو إفادات مسجلة لهذا المتطلب.</p>`;
                    } else {
                        // ترتيب التحديثات للطباعة من الأقدم إلى الأحدث
                        const sortedUpdates = [...r.updates].sort((a,b) => new Date(a.timestamp) - new Date(b.timestamp));
                        
                        sortedUpdates.forEach(up => {
                            html += `
                            <div class="print-update-box">
                                <div style="display:flex; justify-content:space-between; font-size:11px; color:#64748b; border-bottom:1px solid #e2e8f0; padding-bottom:5px; margin-bottom:5px;">
                                    <strong>${up.user}</strong>
                                    <span dir="ltr">${new Date(up.timestamp).toLocaleString('ar-SA')}</span>
                                </div>
                                <p style="font-size:13px; color:#1e293b; margin:0 0 5px 0; white-space:pre-line;">${up.text}</p>
                                ${up.attachmentPath ? `<div style="margin-top:8px; font-size:11px; background:#eff6ff; padding:5px; border:1px dashed #bfdbfe; color:#1d4ed8; word-break:break-all;">📎 <strong>مرفق محلي:</strong> <a href="file:///${up.attachmentPath.replace(/\\/g, '/')}" target="_blank" style="color:#2563eb; text-decoration:none;">${up.attachmentPath}</a></div>` : ''}
                            </div>
                            `;
                        });
                    }

                    html += `
                        </div>
                    </div>
                    `;
                });

                html += `</div>`;
            } else if (type === 'handover') {
                const h = db.handovers.find(x => x.id === directId);
                const fromE = db.employees.find(e=>e.id===h.fromEmpId)?.name;
                const toE = db.employees.find(e=>e.id===h.toEmpId)?.name;
                
                html = `
                    <div class="print-card">
                        <h1 style="text-align:center; margin-bottom: 20px;">محضر تسليم واستلام أعمال</h1>
                        <table class="print-table" style="margin-bottom: 20px;">
                            <tr><th>رقم المحضر</th><td>${h.id.substr(-5)}</td><th>التاريخ</th><td>${h.startDate}</td></tr>
                            <tr><th>المسلم</th><td style="color:red; font-weight:bold;">${fromE}</td><th>المستلم</th><td style="color:green; font-weight:bold;">${toE}</td></tr>
                        </table>
                        <br><br><br><br>
                        <div style="display:flex; justify-content:space-around;">
                            <div style="text-align:center;"><strong>توقيع المسلم</strong><br><br>......................</div>
                            <div style="text-align:center;"><strong>توقيع المستلم</strong><br><br>......................</div>
                        </div>
                    </div>`;
            }

            printArea.innerHTML = html;
            window.print();
        }

        // 11. Settings
        function renderSettings() {
            const v = document.getElementById('view-settings');
            v.innerHTML = `
                <div class="max-w-2xl bg-white dark:bg-darkcard p-6 rounded-lg shadow">
                    <h3 class="text-xl font-bold border-b pb-2 mb-4 dark:text-white"><i class="fas fa-database text-gray-500 ml-2"></i> إدارة البيانات</h3>
                    
                    <div class="space-y-4">
                        <div class="p-4 bg-gray-50 dark:bg-gray-800 rounded flex justify-between items-center">
                            <div><p class="font-bold dark:text-white">تصدير البيانات (نسخة احتياطية)</p></div>
                            <button onclick="exportData()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">تصدير <i class="fas fa-download"></i></button>
                        </div>
                    </div>
                </div>
            `;
        }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "AccountingSystemBackup_" + new Date().toISOString().split('T')[0] + ".json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        // --- Dummy Data Seeder ---
        function seedDB() {
            db.elementTypes = [
                { id: 't1', name: 'بنك', description: 'حسابات بنكية', fields: ['اسم البنك', 'رقم الحساب', 'الآيبان'] },
                { id: 't2', name: 'مورد', description: 'موردين بضائع أو خدمات', fields: ['الرقم الضريبي', 'شروط السداد'] },
            ];

            db.employees = [
                { id: 'e1', code: '1001', name: 'أحمد محمود', title: 'رئيس حسابات', department: 'الإدارة المالية', status: 'نشط', isDeleted: false },
                { id: 'e2', code: '1002', name: 'سارة خالد', title: 'محاسب بنوك', department: 'الخزينة', status: 'نشط', isDeleted: false },
            ];

            db.elements = [
                { id: 'el1', typeId: 't1', code: 'B-001', name: 'بنك الراجحي', status: 'نشط', currency: 'SAR', dynamicData: {'اسم البنك':'الراجحي'} },
            ];

            db.assignments = [
                { id: 'a1', elementId: 'el1', employeeId: 'e2', startDate: '2023-01-01', status: 'نشط', isPermanent: true },
            ];

            db.tasks = [
                { id: 'tk1', title: 'إغلاق ميزانية الربع الثالث', dueDate: new Date(Date.now() + 86400000 * 5).toISOString().split('T')[0], status: 'قيد التنفيذ', priority: 'عالية جداً' },
            ];

            db.requirements = [
                { id: 'rq1', taskId: 'tk1', title: 'تسوية كشوفات البنوك', employeeId: 'e2', dueDate: new Date(Date.now() + 86400000 * 2).toISOString().split('T')[0], isMandatory: true, status: 'قيد التنفيذ', updates: [] },
            ];

            logAction('تهيئة', 'النظام', '0', 'تهيئة النظام وإنشاء بيانات تجريبية');
            saveDB();
        }

        // Initialize App on Load
        window.onload = initDB;

    </script>
</body>
