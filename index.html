        function sortReqs(col) {
            if (currentReqSort.col === col) {
                currentReqSort.dir = currentReqSort.dir === 'asc' ? 'desc' : 'asc';
            } else {
                currentReqSort.col = col;
                currentReqSort.dir = 'asc';
            }
            filterRequirements();
        }

        function filterRequirements() {
            const tbody = document.getElementById('req-tbody');
            if (!tbody) return;

            const fTask = document.getElementById('fr_task').value;
            const fTitle = document.getElementById('fr_title').value.toLowerCase();
            const fEmp = document.getElementById('fr_emp').value;
            const fDate = document.getElementById('fr_date').value;
            const fStatus = document.getElementById('fr_status').value;

            let filtered = db.requirements.filter(r => {
                return (fTask === '' || r.taskId === fTask) &&
                       r.title.toLowerCase().includes(fTitle) &&
                       (fEmp === '' || r.employeeId === fEmp) &&
                       (fDate === '' || r.dueDate === fDate) &&
                       (fStatus === '' || r.status === fStatus);
            });

            filtered.sort((a, b) => {
                let valA = a[currentReqSort.col] || '';
                let valB = b[currentReqSort.col] || '';
                if (valA < valB) return currentReqSort.dir === 'asc' ? -1 : 1;
                if (valA > valB) return currentReqSort.dir === 'asc' ? 1 : -1;
                return 0;
            });

            tbody.innerHTML = filtered.map(r => {
                const task = db.tasks.find(t => t.id === r.taskId)?.title || 'مجهول';
                const emp = db.employees.find(e => e.id === r.employeeId)?.name || 'غير مسند';
                let statusClass = 'bg-gray-100 text-gray-800';
                if(r.status === 'مكتمل') statusClass = 'bg-green-100 text-green-800';
                if(r.status === 'بانتظار بيانات') statusClass = 'bg-yellow-100 text-yellow-800';
                if(r.status === 'معاد للتصحيح') statusClass = 'bg-orange-100 text-orange-800';
                if(r.status === 'مرفوض') statusClass = 'bg-red-100 text-red-800';

                return `
                <tr class="hover:bg-gray-50 dark:hover:bg-gray-700 border-l-4 ${r.isMandatory?'border-red-400':'border-transparent'}">
                    <td class="px-3 py-2 text-xs text-gray-500" title="${task}">${task.length > 20 ? task.substring(0,20) + '..' : task}</td>
                    <td class="px-3 py-2 font-bold">${r.title}</td>
                    <td class="px-3 py-2 text-indigo-600 dark:text-indigo-400">${emp}</td>
                    <td class="px-3 py-2">${r.isMandatory?'<i class="fas fa-check text-red-500"></i>':'-'}</td>
                    <td class="px-3 py-2 ${new Date(r.dueDate) < new Date() && r.status !== 'مكتمل' ? 'text-red-500 font-bold' : ''}">${r.dueDate}</td>
                    <td class="px-3 py-2"><span class="px-2 py-1 text-xs rounded-full ${statusClass}">${r.status}</span></td>
                    <td class="px-3 py-2 flex items-center gap-2">
                        <select onchange="updateReqStatus('${r.id}', this.value, this)" class="text-xs border rounded p-1 dark:bg-gray-600 dark:text-white">
                            <option value="">حالة..</option>
                            <option value="قيد التنفيذ">تنفيذ</option>
                            <option value="بانتظار بيانات">بيانات</option>
                            <option value="معاد للتصحيح">معاد للتصحيح</option>
                            <option value="مكتمل">مكتمل</option>
                        </select>
                        <button onclick="openReqForm('${r.id}')" class="text-blue-500" title="تعديل"><i class="fas fa-edit"></i></button>
                        <button onclick="viewEntityHistory('${r.id}', '${r.title.replace(/'/g, "\\'")}')" class="text-purple-500 hover:text-purple-700" title="سجل حركة المتطلب"><i class="fas fa-history"></i></button>
                        <button onclick="deleteReq('${r.id}')" class="text-red-500" title="حذف"><i class="fas fa-trash"></i></button>
                    </td>
                </tr>`;
            }).join('');
        }

        function deleteReq(id) {
            if(confirm('هل أنت متأكد من حذف هذا المتطلب نهائياً؟')) {
                const req = db.requirements.find(r => r.id === id);
                db.requirements = db.requirements.filter(r => r.id !== id);
                logAction('حذف', 'المتطلبات', id, `حذف المتطلب ${req.title}`);
                saveDB();
                filterRequirements();
                showToast('تم حذف المتطلب بنجاح', 'success');
            }
        }

        // تم التعديل لتشمل نافذة لكتابة سبب/ملاحظة عند تغيير الحالة
        function updateReqStatus(id, newStatus, selectElement) {
            if(!newStatus) return;
            const req = db.requirements.find(r => r.id === id);
            
            if(req.status === newStatus) return;

            let note = prompt(`هل ترغب في إضافة ملاحظة لتغيير الحالة إلى "${newStatus}"؟ (خاصة إذا كان معاد للتصحيح)`, '');
            
            if (note === null) {
                // المستخدم ضغط على إلغاء
                selectElement.value = ''; // إرجاع القائمة المنسدلة إلى الوضع الطبيعي
                return;
            }

            const oldStatus = req.status;
            req.status = newStatus;
            
            let desc = `تغيير الحالة من "${oldStatus}" إلى "${newStatus}"`;
            if (note.trim() !== '') desc += ` | الملاحظة: ${note.trim()}`;
            
            logAction('تحديث حالة', 'المتطلبات', id, desc);
            saveDB(); 
            filterRequirements(); 
            showToast('تم التحديث وحفظ السجل', 'success');
        }

                        <div><label class="block text-sm mb-1 dark:text-gray-300">تاريخ الاستحقاق</label><input type="date" id="rq_due" value="${r.dueDate||''}" required class="form-input"></div>
                        <div>

                            <select id="rq_mand" class="form-input"><option value="true" ${r.isMandatory?'selected':''}>إلزامي لإقفال المهمة</option><option value="false" ${!r.isMandatory?'selected':''}>اختياري</option></select>
                        </div>
                        <div class="md:col-span-2"><label class="block text-sm mb-1 dark:text-gray-300">الوصف</label><textarea id="rq_desc" class="form-input">${r.description||''}</textarea></div>
                        <div class="md:col-span-2 flex justify-end gap-2 mt-4">
                            <button type="submit" class="px-4 py-2 bg-yellow-600 text-white rounded hover:bg-yellow-800">حفظ</button>
                        </div>
                    </form>
                </div>
            `;
            openModal('reqModal', html);
        }

        function saveReq(e, id) {
            e.preventDefault();
            const data = {
                taskId: document.getElementById('rq_task').value,
                title: document.getElementById('rq_title').value,
                employeeId: document.getElementById('rq_emp').value,
                dueDate: document.getElementById('rq_due').value,
                isMandatory: document.getElementById('rq_mand').value === 'true',
                description: document.getElementById('rq_desc').value
            };

            if(id !== 'null') {
                const idx = db.requirements.findIndex(x => x.id === id);
                db.requirements[idx] = { ...db.requirements[idx], ...data };
                logAction('تعديل', 'المتطلبات', id, `تعديل تفاصيل المتطلب`);
            } else {
                const newId = generateId();
                db.requirements.push({ id: newId, status: 'مسند', ...data });
                logAction('إنشاء', 'المتطلبات', newId, `إنشاء وإسناد متطلب جديد`);
            }
            saveDB(); closeModal('reqModal'); filterRequirements();
        }

        function saveHandover(e) {
            e.preventDefault();
            const fromId = document.getElementById('ho_from').value;
            const toId = document.getElementById('ho_to').value;
            if(fromId === toId) { showToast('لا يمكن التسليم لنفس الموظف', 'error'); return; }

            const date = document.getElementById('ho_date').value;
            const type = document.getElementById('ho_type').value;

            // 1. Get active assignments for 'fromId'
            const activeAssigns = db.assignments.filter(a => a.employeeId === fromId && a.status === 'نشط');
            const elementsTransferred = [];
            
            activeAssigns.forEach(a => {
                a.status = 'مغلق'; a.endDate = date; // close old
                db.assignments.push({
                    id: generateId(), elementId: a.elementId, employeeId: toId,
                    startDate: date, endDate: null, isPermanent: type.includes('دائم'),
                    reason: `تسليم واستلام من ${db.employees.find(e=>e.id===fromId).name}`, status: 'نشط'
                });
                elementsTransferred.push(a.elementId);
            });

            // 2. Get open requirements for 'fromId'
            const openReqs = db.requirements.filter(r => r.employeeId === fromId && ['جديد','مسند','قيد التنفيذ','بانتظار بيانات','معاد للتصحيح'].includes(r.status));
            const reqsTransferred = [];

            openReqs.forEach(r => {
                r.employeeId = toId; // update assignee
                reqsTransferred.push(r.id);
            });

            const hoId = generateId();
            db.handovers.push({
                id: hoId, fromEmpId: fromId, toEmpId: toId, startDate: date, type: type,
                status: 'مغلق', elementsTransferred, requirementsTransferred,
                notes: document.getElementById('ho_notes').value
            });

            logAction('تسليم واستلام', 'التسليم', hoId, `نقل ${elementsTransferred.length} عنصر و ${reqsTransferred.length} متطلب`);
            saveDB(); closeModal('hoModal'); renderHandovers(); showToast('تم الاعتماد والنقل بنجاح', 'success');
        }

                            ${reqs.map(r => {
                                const tName = db.tasks.find(t=>t.id===r.taskId)?.title;
                                return `<tr><td>${r.title}</td><td>${tName||''}</td><td>${r.dueDate}</td><td>${r.status}</td></tr>`;
                            }).join('')}
                        </table>
                    </div>`;
            } else if (type === 'task') {
                const id = document.getElementById('rep_taskId').value;
                if(!id) return;
                const task = db.tasks.find(t => t.id === id);
                const reqs = db.requirements.filter(r => r.taskId === id);
                
                const incTaskHist = document.getElementById('rep_task_history').checked;
                const incReqHist = document.getElementById('rep_req_history').checked;
                
                html = `
                    <div class="print-card">
                        <h1 style="text-align:center; margin-bottom: 20px; color:#1e3a8a;">تقرير المهمة التفصيلي</h1>
                        
                        <div style="background-color:#f8fafc; padding:15px; border:1px solid #cbd5e1; margin-bottom: 20px;">
                            <table class="print-table" style="margin-bottom: 0;">
                                <tr><th style="width:150px; background:#e2e8f0;">العنوان</th><td colspan="3" style="font-weight:bold; font-size:16px;">${task.title}</td></tr>
                                <tr><th style="background:#e2e8f0;">الحالة</th><td>${task.status}</td><th style="background:#e2e8f0;">الاستحقاق</th><td>${task.dueDate}</td></tr>

                            </table>
                        </div>`;
                
                // إضافة سجل المهمة إذا تم اختياره
                if(incTaskHist) {
                    const tLogs = db.auditLog.filter(l => l.entityId === id);
                    if(tLogs.length > 0) {
                        html += `
                        <h3 style="color:#1e3a8a; border-bottom:1px solid #1e3a8a; padding-bottom:5px;">سجل التعديلات والحركة للمهمة</h3>
                        <table class="print-table" style="margin-bottom: 20px; font-size:12px;">
                            <tr style="background:#f1f5f9;"><th>التاريخ</th><th>الإجراء</th><th>التفاصيل</th><th>المستخدم</th></tr>
                            ${tLogs.map(l => `<tr><td dir="ltr">${new Date(l.timestamp).toLocaleString('ar-SA')}</td><td>${l.action}</td><td>${l.desc}</td><td>${l.user}</td></tr>`).join('')}
                        </table>`;
                    }
                }

                html += `
                        <h3 style="color:#1e3a8a; border-bottom:1px solid #1e3a8a; padding-bottom:5px; margin-top:30px;">المتطلبات المرتبطة (${reqs.length})</h3>
                        <table class="print-table" style="margin-bottom: 20px;">
                            <tr style="background:#f1f5f9;"><th>المتطلب</th><th>المسؤول</th><th>إلزامي</th><th>الحالة</th></tr>
                            ${reqs.map(r => {
                                const empName = db.employees.find(e=>e.id===r.employeeId)?.name;
                                return `<tr><td style="font-weight:bold;">${r.title}</td><td>${empName||'-'}</td><td>${r.isMandatory?'نعم':'لا'}</td><td>${r.status}</td></tr>`;
                            }).join('')}
                        </table>`;

                // إضافة سجل المتطلبات إذا تم اختياره
                if(incReqHist && reqs.length > 0) {
                    html += `<div style="page-break-before: auto;"><h3 style="color:#b45309; border-bottom:1px solid #b45309; padding-bottom:5px; margin-top:30px;">سجل الحركة للمتطلبات (التتبع والتصحيحات)</h3>`;
                    reqs.forEach(r => {
                        const rLogs = db.auditLog.filter(l => l.entityId === r.id);
                        if(rLogs.length > 0) {
                            html += `
                            <h4 style="margin-bottom: 5px; color:#475569; background:#f8fafc; padding:5px;">📌 متطلب: ${r.title}</h4>
                            <table class="print-table" style="margin-bottom: 20px; font-size:12px;">
                                <tr style="background:#f1f5f9;"><th>التاريخ</th><th>الإجراء</th><th>الملاحظات والتفاصيل</th><th>المستخدم</th></tr>
                                ${rLogs.map(l => `<tr><td dir="ltr">${new Date(l.timestamp).toLocaleString('ar-SA')}</td><td>${l.action}</td><td>${l.desc}</td><td>${l.user}</td></tr>`).join('')}
                            </table>`;
                        }
                    });
                    html += `</div>`;
                }

                html += `</div>`;
            } else if (type === 'handover') {
                const h = db.handovers.find(x => x.id === directId);
                const fromE = db.employees.find(e=>e.id===h.fromEmpId)?.name;
                const toE = db.employees.find(e=>e.id===h.toEmpId)?.name;
                
                html = `
                    <div class="print-card">
                        <h1 style="text-align:center; margin-bottom: 20px;">محضر تسليم واستلام أعمال</h1>
                        <table class="print-table" style="margin-bottom: 20px;">
                            <tr><th>رقم المحضر</th><td>${h.id.substr(-5)}</td><th>التاريخ</th><td>${h.startDate}</td></tr>
                            <tr><th>المسلم</th><td style="color:red; font-weight:bold;">${fromE}</td><th>المستلم</th><td style="color:green; font-weight:bold;">${toE}</td></tr>
                            <tr><th>النوع</th><td>${h.type}</td><th>ملاحظات</th><td>${h.notes||'-'}</td></tr>
                        </table>
                        
                        <h3>العناصر المنقولة (${h.elementsTransferred.length})</h3>
                        <p style="font-size:12px;">تم نقل عهدة العناصر التالية وإغلاقها على المسلم وفتحها للمستلم في النظام.</p>
                        
                        <div style="margin-top:50px; display:flex; justify-content:space-around;">
                            <div style="text-align:center;"><strong>توقيع المسلم</strong><br><br>......................</div>
                            <div style="text-align:center;"><strong>توقيع المستلم</strong><br><br>......................</div>
                            <div style="text-align:center;"><strong>اعتماد رئيس الحسابات</strong><br><br>......................</div>
                        </div>
                    </div>`;
            }

            printArea.innerHTML = html;
            window.print();
        }

        // 11. Settings
        function renderSettings() {

            v.innerHTML = `

                    <div class="space-y-4">
                        <div class="p-4 bg-gray-50 dark:bg-gray-800 rounded flex justify-between items-center">
                            <div><p class="font-bold dark:text-white">تصدير البيانات (نسخة احتياطية)</p><p class="text-sm text-gray-500">حفظ جميع البيانات في ملف JSON</p></div>
                            <button onclick="exportData()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">تصدير <i class="fas fa-download"></i></button>
                        </div>

                        <div class="p-4 bg-gray-50 dark:bg-gray-800 rounded flex justify-between items-center">
                            <div><p class="font-bold dark:text-white">استيراد البيانات</p><p class="text-sm text-gray-500">استعادة البيانات من ملف JSON (سيتم استبدال الحالي)</p></div>
                            <div>
                                <input type="file" id="importFile" class="hidden" accept=".json" onchange="importData(event)">
                                <button onclick="document.getElementById('importFile').click()" class="bg-yellow-600 text-white px-4 py-2 rounded hover:bg-yellow-700">استيراد <i class="fas fa-upload"></i></button>
                            </div>
                        </div>

                        <div class="p-4 bg-red-50 dark:bg-red-900 rounded flex justify-between items-center mt-8 border border-red-200">
                            <div><p class="font-bold text-red-600 dark:text-red-300">مسح جميع البيانات</p><p class="text-sm text-red-500">إعادة النظام لحالة الصفر. لا يمكن التراجع!</p></div>
                            <button onclick="clearAllData()" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">مسح النظام <i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                </div>
            `;
        }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "AccountingSystemBackup_" + new Date().toISOString().split('T')[0] + ".json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
            showToast('تم التصدير بنجاح', 'success');
        }

        function importData(event) {
            const file = event.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if(imported.employees && imported.elements) {
                        db = imported;
                        saveDB();
                        showToast('تم استيراد البيانات بنجاح', 'success');
                        setTimeout(()=> location.reload(), 1000);
                    } else {
                        showToast('ملف غير مدعوم', 'error');
                    }
                } catch(err) { showToast('خطأ في قراءة الملف', 'error'); }
            };
            reader.readAsText(file);
        }

        function clearAllData() {
            if(confirm('تحذير خطير: سيتم حذف جميع بيانات النظام والموظفين والمهام بلا رجعة. هل أنت متأكد؟')) {
                if(prompt('اكتب "نعم" للتأكيد') === 'نعم') {
                    localStorage.removeItem(DB_KEY);
                    location.reload();
                }
            }
        }
